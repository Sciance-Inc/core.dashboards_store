version: 2

models:
  - name: resignation_report_age
    description: > 
      la liste des employés ayant démissionnés
    config:
      alias: resignation_report_age
      tags:
        - resignation
        - PMO
        - human_resources
      schema: dashboard_resignation 
    columns: 
      - name: matr
        tests: 
            - not_null
      - name: etat_empl
      - name: corp_empl
      - name: ref_empl
      - name: lieu_trav
      - name: genre
      - name: legal_name
      - name: stat_eng
      - name: demission_date
      - name: demission_age
      - name: school_year
      - name: job_group_description,
      - name: job_group_category,
      - name: Days_employment
      - name: filter_key
      

  - name: resignation_report_rate
    description: > 
      Pour le calcul du taux de démission
    config:
      alias: resignation_report_rate
      tags:
        - resignation
        - PMO
        - human_resources
      schema: dashboard_resignation     
    columns: 
      - name: matr
        tests: 
            - not_null
      - name: corp_empl
      - name: lieu_trav
      - name: etat_empl
      - name: stat_eng
      - name: school_year
      - name: genre
      - name: legal_name
      - name: RaisonDemission
      - name: job_group_description
      - name: job_group_category
      - name: jnbremploi,
      - name: jnbrdemission,
      - name: Taux_Demission,
      - name: filter_key
      
  
  - name: resignation_report_filters
    description: >
      The set of filters to be applied on the report.
      This table exists because of a double granularity difference between the report_resignation_age and the resignation_report_rate tables.
    config:
      alias: resignation_report_filters
      tags:
        - resignation
        - PMO
        - human_resources
      schema: dashboard_resignation        
    columns: 
      - name: corp_empl
      - name: lieu_trav
      - name: genre
      - name: stat_eng
      - name: school_year
      - name: job_group_category
      - name: filter_key
      - name: engagement_status_name
      - name: workplace_name
      - name: filter_source
      - name: Corp_emploi_description

    tests:
      - resolution:
          combination_of_columns:
            - etat_empl
            - corp_empl
            - lieu_trav
            - genre
            - stat_eng
            - school_year
            - job_group_category
            - filter_key
            - engagement_status_name
            - workplace_name
            - filter_source
            - Corp_emploi_description

